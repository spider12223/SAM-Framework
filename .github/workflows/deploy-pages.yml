# Builds the S.A.M Mod Builder (gui/) and deploys it to GitHub Pages on every
# push to main. Enable it once under Settings → Pages → "Build and deployment"
# → Source: "GitHub Actions". Serves at https://<user>.github.io/SAM-Framework/
name: Deploy Mod Builder to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Install deps
        working-directory: gui
        run: npm ci
      - name: Build (base=/SAM-Framework/)
        working-directory: gui
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: gui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
